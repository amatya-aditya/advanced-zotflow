name: Release

on:
    push:
        tags:
            - "**"

env:
    PLUGIN_NAME: obsidian-zotflow

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x]

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
            - run: npm ci
            - run: npm run build:ci --if-present

            - name: Package
              id: build
              run: |
                  mkdir -p ${{ env.PLUGIN_NAME }}
                  cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
                  zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
                  echo "zip_path=${{ env.PLUGIN_NAME }}.zip" >> "$GITHUB_OUTPUT"
                  echo "zip_asset_name=${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip" >> "$GITHUB_OUTPUT"

            - name: Create or update release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  set -euo pipefail

                  tag="${{ github.ref_name }}"
                  zip_path="./${{ steps.build.outputs.zip_path }}"
                  zip_asset_name="${{ steps.build.outputs.zip_asset_name }}"

                  if gh release view "$tag" >/dev/null 2>&1; then
                      gh release upload "$tag" \
                          "${zip_path}#${zip_asset_name}" \
                          "./main.js#main.js" \
                          "./manifest.json#manifest.json" \
                          "./styles.css#styles.css" \
                          --clobber
                  else
                      gh release create "$tag" \
                          "${zip_path}#${zip_asset_name}" \
                          "./main.js#main.js" \
                          "./manifest.json#manifest.json" \
                          "./styles.css#styles.css" \
                          --title "$tag"
                  fi
